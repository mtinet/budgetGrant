<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교부확인서 발급</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', 'Pretendard', sans-serif; background: #f5f6f8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
  .container { background: #fff; border-radius: 16px; border: 0.5px solid #e0e0e0; padding: 2.5rem 2.5rem 2rem; max-width: 480px; width: 100%; }
  .badge { display: inline-block; background: #eef2ff; color: #4056c8; font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 20px; margin-bottom: 1rem; }
  h1 { font-size: 18px; font-weight: 600; color: #1a1a2e; line-height: 1.5; margin-bottom: 0.35rem; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 1.75rem; line-height: 1.6; }
  label { display: block; font-size: 13px; font-weight: 500; color: #444; margin-bottom: 6px; }
  input { width: 100%; padding: 10px 14px; font-size: 14px; border: 1px solid #ddd; border-radius: 8px; outline: none; transition: border 0.2s; background: #fafafa; color: #1a1a2e; }
  input:focus { border-color: #4056c8; background: #fff; }
  .field { margin-bottom: 1rem; }
  .btn { width: 100%; padding: 12px; background: #4056c8; color: #fff; font-size: 15px; font-weight: 600; border: none; border-radius: 10px; cursor: pointer; margin-top: 0.5rem; transition: background 0.2s, transform 0.1s; }
  .btn:hover { background: #3247b5; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { background: #b0b8e0; cursor: not-allowed; }
  .msg { margin-top: 1rem; padding: 12px 16px; border-radius: 8px; font-size: 13px; line-height: 1.8; display: none; white-space: pre-line; }
  .msg.success { background: #eef9f1; color: #1d6e3a; border: 0.5px solid #a3d9b1; }
  .msg.error { background: #fff1f1; color: #b53030; border: 0.5px solid #f5b0b0; }
  .period-info { background: #f7f8ff; border: 0.5px solid #d0d6f5; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #5566aa; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #4056c8; flex-shrink: 0; }
  .expired-wrap { text-align: center; padding: 1rem 0; display: none; }
  .expired-icon { font-size: 36px; margin-bottom: 0.75rem; }
  .expired-title { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 0.5rem; }
  .expired-desc { font-size: 13px; color: #888; line-height: 1.8; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.5); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .footer { margin-top: 1.5rem; font-size: 11px; color: #bbb; text-align: center; }
</style>
</head>
<body>

<div class="container">
  <div class="badge">2026 글로벌 현장학습 사업단</div>
  <h1>교부확인서 발급</h1>
  <p class="subtitle">학교명과 NEIS 번호를 입력하시면<br>교부확인서 PDF가 자동으로 다운로드됩니다.</p>
  <div class="period-info">
    <span class="dot"></span>
    <span>발급 기간: <strong>2026.04.01 ~ 2026.06.30</strong></span>
  </div>
  <div id="formSection">
    <div class="field">
      <label for="schoolName">학교명</label>
      <input type="text" id="schoolName" placeholder="예) 서울○○초등학교" autocomplete="off">
    </div>
    <div class="field">
      <label for="neisNum">NEIS 번호</label>
      <input type="text" id="neisNum" placeholder="예) B100000000" autocomplete="off">
    </div>
    <button class="btn" id="submitBtn">교부확인서 다운로드</button>
    <div class="msg" id="msgBox"></div>
  </div>
  <div class="expired-wrap" id="expiredSection">
    <div class="expired-icon">🔒</div>
    <div class="expired-title">발급 기간이 아닙니다</div>
    <div class="expired-desc">교부확인서 발급 기간은<br><strong>2026년 4월 1일 ~ 6월 30일</strong>입니다.<br>기간 내에 다시 접속해 주세요.</div>
  </div>
  <div class="footer">문의: 교육청 담당자 | ☎ 02-6033-6134</div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
  const supabase = createClient(
    'https://kjhububjqsvitkaagfzd.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqaHVidWJqcXN2aXRrYWFnZnpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NTMyNDEsImV4cCI6MjA5MjMyOTI0MX0.IKD1hprLvoDCwk-oQrv9KAscfZu93RwKaLFkY2rOfUw'
  );

  const DOWNLOAD_START = new Date('2026-04-01');
  const DOWNLOAD_END   = new Date('2026-06-30T23:59:59');
  if (new Date() < DOWNLOAD_START || new Date() > DOWNLOAD_END) {
    document.getElementById('formSection').style.display = 'none';
    document.getElementById('expiredSection').style.display = 'block';
  }

  document.getElementById('submitBtn').addEventListener('click', async () => {
    const schoolName = document.getElementById('schoolName').value.trim();
    const neisNum    = document.getElementById('neisNum').value.trim();
    const btn        = document.getElementById('submitBtn');
    const msgBox     = document.getElementById('msgBox');
    msgBox.style.display = 'none';
    msgBox.className = 'msg';

    if (!schoolName || !neisNum) { showMsg('학교명과 NEIS 번호를 모두 입력해 주세요.', 'error'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>조회 중...';

    const { data, error } = await supabase
      .from('schools').select('*')
      .eq('school_name', schoolName).eq('neis_number', neisNum).single();

    if (error || !data) {
      showMsg('일치하는 학교 정보가 없습니다. 학교명과 NEIS 번호를 다시 확인해 주세요.', 'error');
    } else {
      setTimeout(() => downloadPDF(data), 600);
    }
    btn.disabled = false;
    btn.innerHTML = '교부확인서 다운로드';
  });

  async function downloadPDF(record) {
    if (!record.file_url) { showMsg('파일이 아직 등록되지 않았습니다. 담당자에게 문의해 주세요.', 'error'); return; }
    try {
      const res  = await fetch(record.file_url);
      const blob = await res.blob();
      const blobUrl = URL.createObjectURL(new Blob([blob], { type: 'application/octet-stream' }));
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = '교부확인서_' + record.school_name + '.pdf';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
      showMsg('✓ 교부확인서가 다운로드되었습니다.\n우측 상단의 \'최근 다운로드 기록\' 버튼을 눌러 파일을 확인하세요.', 'success');
    } catch(e) {
      showMsg('다운로드 중 오류가 발생했습니다. 담당자에게 문의해 주세요.', 'error');
    }
  }

  function showMsg(text, type) {
    const m = document.getElementById('msgBox');
    m.textContent = text; m.className = 'msg ' + type; m.style.display = 'block';
  }
</script>
</body>
</html>
